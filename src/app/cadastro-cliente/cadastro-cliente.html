<div class="tela">
  <div class="container">

   
    <div class="direita">
  <form (ngSubmit)="enviarDados()" class="form-group">
    <h1>SEJA BEM-VINDO, CLIENTE</h1>

    <label>Nome Completo:</label>
    <input type="text" name="nome" [(ngModel)]="dados.nome" placeholder="Seu nome completo">

    <label>Email:</label>
    <input type="email" name="email" [(ngModel)]="dados.email" placeholder="Seu email">

    <label>Senha:</label>
    <input type="password" name="senha" [(ngModel)]="dados.senha" placeholder="Sua senha">

    <label>Confirmar Senha:</label>
    <input type="password" name="confirmarSenha" [(ngModel)]="dados.confirmarSenha" placeholder="Confirme sua senha">

    <label>Telefone:</label>
    <input type="text" name="telefone" [(ngModel)]="dados.telefone" placeholder="Seu telefone">

    <label>CPF:</label>
    <input type="text" name="cpf" [(ngModel)]="dados.cpf" placeholder="Seu CPF">

    <label class="checkbox-linha">
      <input type="checkbox" name="condicao" [(ngModel)]="possuiCondicaoEspecial">
      Possui alguma condição especial? (Ex: Idade avançada, mobilidade reduzida, etc.)
    </label>

    @if(possuiCondicaoEspecial){
      <input type="text" name="descricaoCondicao" [(ngModel)]="dados.descricaoCondicao" placeholder="Descreva sua condição">
    }

    <div class="separador"></div>

    <button type="submit" class="btn-primary">CADASTRAR</button>
  </form>
</div>


    <div class="esquerda">
      <div class="conteudo-esquerda">
        <h1>BarbTech</h1>
        <p>Cadastre-se e faça seus agendamentos</p>
      </div>
    </div>

  </div>
</div>
